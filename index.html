<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛而逼之的卡面</title>
    <!-- 引入外部样式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- 卡片容器 -->
    <div class="profile-card">
        <h1>个人简介卡片</h1>
        <!-- 1. 头像区域 -->
        <!-- hidden属性隐藏默认input，用label模拟按钮 -->
        <input type="file" id="avatarInput" accept="image/*" hidden>
        <label for="avatarInput" class="avatar-container">
            <!-- 这里是图片显示的地方 -->
            <img src="https://via.placeholder.com/100" alt="头像" id="avatarImg">
            <div class="upload-icon">+</div>
        </label>

        <!-- 2. 姓名区域 -->
        <div class="input-group">
            <label for="nameInput">姓名:</label>
            <input type="text" id="nameInput" value="张三">
        </div>

        <!-- 3. 简介区域 -->
        <div class="input-group">
            <label for="bioInput">个人简介:</label>
            <textarea id="bioInput" rows="3">这里是默认的个人简介。</textarea>
        </div>

        <!-- 4. 保存按钮 -->
        <button id="saveBtn">保存修改</button>

    </div>
</div>

<!-- 引入外部JS脚本 -->
<script src="script.js"></script>
</body>
</html>
